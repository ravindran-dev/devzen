version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/devzen
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=devzen_super_secret_key_12345
      - GITHUB_CLIENT_ID=mock_client_id
      - GITHUB_CLIENT_SECRET=mock_client_secret
      - GITHUB_REDIRECT_URI=http://localhost:8000/api/v1/auth/github/callback
      - GEMINI_API_KEY=mock_gemini_key
      - OPENAI_API_KEY=mock_openai_key
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A app.workers.celery_app.celery worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/devzen
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=devzen_super_secret_key_12345
      - GEMINI_API_KEY=mock_gemini_key
      - OPENAI_API_KEY=mock_openai_key
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=devzen
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
